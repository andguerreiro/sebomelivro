<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="../logo.png" />
  <meta name="description" content="Buscador do Sebomelivro. Encontre todos os livros à venda pesquisando por título ou autor.">
  <title>Busca - Sebomelivro</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fff;
      color: black;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #343541;
        color: white;
      }
    }

    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .search-container {
      text-align: center;
      background-color: inherit;
      padding: 10px;
      max-width: 600px;
    }

    img {
      display: block;
      margin: 10px auto;
      border-radius: 50%;
      height: 160px;
      width: 160px;
    }

    .search-input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
      outline: none;
    }

    .search-button {
      padding: 10px 20px;
      background-color: black;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      width: 120px;
    }
  </style>
</head>
<body>
  <div class="center">
    <div class="search-container">
      <a href="../"><img src="../logo.png" alt="Logo"></a>
      <form target="_blank" action="https://www.estantevirtual.com.br/busca">
        <input class="search-input" type="hidden" name="vendedor" value="sebomelivro">
        <input class="search-input" type="search" placeholder="Digite um título ou autor..." name="q" autofocus>
        <button class="search-button" type="submit">Garimpar</button>
        <button class="search-button" type="reset">Limpar</button>
      </form>
      <p>"Um livro é um sonho que você segura em suas mãos." - Neil Gaiman</p>
    </div>
  </div>
</body>
</html>
