<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sebo digital de livros usados. Retire seu pedido no metrô Fradique Coutinho ou arredores. Coleta gratuita de doações de livros em São Paulo, SP. Atendimento por WhatsApp.">
  <meta name="keywords" content="sebo digital, livros usados, doar livros SP">
  <link rel="icon" type="image/png" href="logo.png">
  <style>
    body{max-width:800px;margin:0 auto;padding:10px;font-family:'Courier New',monospace;font-weight:bold;line-height:1.6;font-size:1.1em;}a{color:black;}@media(prefers-color-scheme:dark){body{background-color:#333;color:white;}a{color:white;}}.css-typing{white-space:pre-line;}
  </style>
  <title>Sebomelivro - Livre-se das telas. Leia um livro.</title>
</head>
<body>

<div class="css-typing"></div>

<script defer>
  document.addEventListener("DOMContentLoaded",function(){var e="Estimado leitor,\n\nBem-vindo ao Sebomelivro, um sebo digital de livros usados. Todos os exemplares à venda estão na Estante Virtual. Garimpe por título ou autor e deixe um livro desconhecido te encontrar.\n\nSe não quiser pagar frete, pode retirar seu pedido pessoalmente comigo nas catracas do metrô Fradique Coutinho ou arredores.\n\nCaso tenha livros de literatura para doar, eu coleto no local (São Paulo, SP). Basta agendar um horário.\n\nEntre em contato pelo WhatsApp (11) 98135-0566. Nele, além de agendar os serviços acima, também posso te enviar fotos detalhadas de um livro antes de você comprar.\n\nEssa página simula uma carta digitada por uma máquina de escrever, para nos remeter à aura nostáugica dos livros antigos. E sim, ela é só isso mesmo. Sem fotos, vídeos, anúncios ou redes sociais. Dessa forma, sobra mais tempo pra gente ler um livro.\n\nBoas leituras!\n\nAtenciosamente,\nA.M. Guerreiro\n\n\"Um leitor vive mil vidas antes de morrer, o homem que nunca lê vive apenas uma.\" - George R.R. Martin";var t=document.querySelector(".css-typing");e.split("").forEach(function(e,n){var a=document.createElement("span");a.innerHTML=e.replace(/\n/g,"<br>"),a.style.opacity=0,t.appendChild(a),setTimeout(function(){a.style.opacity=1},30*n)})});
</script>

</body>
</html>
