<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sebo digital de livros usados. Retire seu pedido no metrô Fradique Coutinho ou arredores. Coleta gratuita de doações de livros em São Paulo, SP. Atendimento por WhatsApp.">
  <meta name="keywords" content="sebo digital, livros usados, doar livros são paulo, coleta gratuita livros">
  <link rel="icon" type="image/png" href="logo.png">
  <style>
    body {
      max-width: 700px;
      margin: 0 auto;
      padding: 15px;
      font-family: sans-serif;
      line-height: 1.6;
      font-size: 1.2em;
    }
    .css-typing {
      white-space: pre-line;
    }
  </style>
  <title>Sebomelivro</title>
</head>
<body>
  <div class="css-typing"></div>
  <script defer>
    document.addEventListener("DOMContentLoaded", function () {
      var e = "O Sebomelivro, um sebo digital de livros usados, convida os amantes da leitura a garimpar seu acervo na Estante Virtual. O atendimento personalizado ocorre através de mensagem para (11) 98135-0566, conectando leitores ao seu livreiro.\n\nPedidos podem ser entregues pelos Correios ou retirados no metrô Fradique Coutinho. Há também a opção de doar seus livros sem sair de casa, com a coleta gratuita em São Paulo.\n\nNotavelmente simples em sua abordagem, o Sebomelivro destaca-se pela ausência de fotos, vídeos ou redes sociais, assemelhando-se à página de um livro sendo digitada. A ideia é instigar uma experiência literária autêntica, onde o encontro entre leitor e livro seja a estrela principal, desprovido de distrações digitais.\n\nLivre-se das telas. Leia um livro.\n\n© 2023 A.M. Guerreiro";
      var t = document.querySelector(".css-typing");
      e.split("").forEach(function (e, n) {
        var a = document.createElement("span");
        a.innerHTML = e.replace(/\n/g, "<br>"), a.style.opacity = 0, t.appendChild(a), setTimeout(function () {
          a.style.opacity = 1
        }, 40 * n)
      })
    });
  </script>
</body>
</html>
