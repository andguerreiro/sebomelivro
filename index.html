<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sebo digital de livros usados. Retire seu pedido no metrô Fradique Coutinho ou arredores. Coleta gratuita de doações de livros em São Paulo, SP. Atendimento por WhatsApp.">
  <meta name="keywords" content="sebo digital, livros usados, doar livros são paulo, coleta gratuita livros">
  <link rel="icon" type="image/png" href="logo.png">
  <style>
    body {
      max-width: 700px;
      margin: 0 auto;
      padding: 15px;
      font-family: sans;
      line-height: 1.6;
      font-size: 1.3em;
    }
    .css-typing {
      white-space: pre-line;
    }
    .footer {
      font-family: sans-serif;
      font-style: italic;
      font-size: 0.8em;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #333;
        color: white;
      }
    }
  </style>
  <title>Sebomelivro - Livre-se das telas. Leia um livro.</title>
</head>
<body>
  <div class="css-typing"></div>
  <p class="footer">_____<br>(1) <a href="https://www.estantevirtual.com.br/livreiros/sebomelivro" target="_blank">sebomelivro.com/loja</a><br>(2) <a href="https://wa.me/551198135055" target="_blank">sebomelivro.com/contato</a><br>(3) <a href="https://blogmelivro.wordpress.com/" target="_blank">sebomelivro.com/blog</a></p>
  <script defer>
    document.addEventListener("DOMContentLoaded", function () {
      var e = "O Sebomelivro é um sebo digital de livros usados.\n\nOs livros disponíveis são vendidos pela Estante Virtual (1) ou por mensagem via WhatsApp (2) e os pedidos são entregues pelos Correios ou pessoalmente nas catracas do metrô Fradique Coutinho.\n\nSe você tiver livros para doar, agende uma coleta gratuita no seu endereço em São Paulo.\n\nConfira meus artigos sobre livros no Blogmelivro (3).\n\nNo sebomelivro.com não há fotos nem vídeos. É como uma página de livro sendo digitada. Um convite para mergulhar nas palavras sem distrações.\n\nBoas leituras!\n\nA.M. Guerreiro, livreiro";
      var t = document.querySelector(".css-typing");
      e.split("").forEach(function (e, n) {
        var a = document.createElement("span");
        a.innerHTML = e.replace(/\n/g, "<br>"), a.style.opacity = 0, t.appendChild(a), setTimeout(function () {
          a.style.opacity = 1
        }, 40 * n)
      })
    });
  </script>
</body>
</html>
