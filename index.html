<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sebo digital de livros usados. Retire seu pedido no metrô Fradique Coutinho ou arredores. Coleta gratuita de doações de livros em São Paulo, SP. Atendimento por WhatsApp.">
  <meta name="keywords" content="sebo digital, livros usados, doar livros são paulo, coleta gratuita livros">
  <link rel="icon" type="image/png" href="logo.png">
  <style>
    body {
      max-width: 700px;
      margin: 0 auto;
      padding: 15px;
      font-family: sans-serif;
      line-height: 1.6;
      font-size: 1.2em;
    }
    .css-typing {
      white-space: pre-line;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #333;
        color: white;
      }
    }
  </style>
  <title>Sebomelivro</title>
</head>
<body>
  <div class="css-typing"></div>
  <script defer>
    document.addEventListener("DOMContentLoaded", function () {
      var e = "Querido leitor,\n\nBem-vindo ao Sebomelivro, um refúgio digital de livros usados, onde a magia das palavras ganha vida.\n\nSinta-se à vontade para garimpar e comprar os livros disponíveis na Estante Virtual em sebomelivro.com/loja ou realizar suas compras diretamente pelo WhatsApp, enviando uma mensagem para (11) 98135-0566.\n\nSeu pedido pode ser entregue pelos Correios ou retirado pessoalmente nas catracas do metrô Fradique Coutinho. E se você tiver livros para doar, ficarei grato em agendar uma coleta gratuita no seu endereço em São Paulo.\n\nConfira meus artigos sobre tendências, desafios e o valor dos livros na cultura atual em sebomelivro.com/blog.\n\nNo site do Sebomelivro, a simplicidade é a essência. Sem fotos ou vídeos, simula a atmosfera de uma página de livro sendo digitada e convida-o a mergulhar nas palavras sem distrações.\n\nO Sebomelivro não está presente em nenhuma rede social. Assim, sobra mais tempo para a gente ler um livro.\n\nBoas leituras!\n\nAtenciosamente,\nA.M. Guerreiro, livreiro";
      var t = document.querySelector(".css-typing");
      e.split("").forEach(function (e, n) {
        var a = document.createElement("span");
        a.innerHTML = e.replace(/\n/g, "<br>"), a.style.opacity = 0, t.appendChild(a), setTimeout(function () {
          a.style.opacity = 1
        }, 40 * n)
      })
    });
  </script>
</body>
</html>
