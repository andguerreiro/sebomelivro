<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sebo digital de livros usados. Retire seu pedido no metrô Fradique Coutinho ou arredores. Coleta gratuita de doações de livros em São Paulo, SP. Atendimento por WhatsApp.">
  <meta name="keywords" content="sebo digital, livros usados, doar livros SP">
  <link rel="icon" type="image/png" href="logo.png">
  <style>
    body{max-width:800px;margin:0 auto;padding:10px;font-family:'Courier New',monospace;font-weight:bold;line-height:1.6;font-size:1.1em;}a{color:black;}@media(prefers-color-scheme:dark){body{background-color:#333;color:white;}a{color:white;}}.css-typing{white-space:pre-line;}
  </style>
  <title>Sebomelivro - Livre-se das telas. Leia um livro.</title>
</head>
<body>

<div class="css-typing"></div>

<script defer>
  document.addEventListener("DOMContentLoaded",function(){var e="Caro leitor,\n\nBem-vindo ao Sebomelivro, um sebo digital de livros já lidos. Todo o acervo disponível está à venda via Estante Virtual. Caso queira retirar um livro pessoalmente, eu entrego nas catracas do metrô Fradique Coutinho e arredores.\n\nSe tiver livros de literatura para doar, agende uma coleta gratuita no seu endereço em São Paulo. Assim você libera espaço para novos livros e possibilita que seus livros cheguem a outros leitores.\n\nEnvie mensagem pelo WhatsApp (11) 98135-0566 com dúvidas ou para solicitar fotos detalhadas de um livro antes de comprar.\n\nEssa página simula uma carta digitada em uma máquina de escrever para nos remeter à aura nostálgica dos livros antigos. Sem fotos, vídeos ou redes sociais. Que nos engaje a ler um livro e nada mais.\n\nBoas leituras!\n\nÀ disposição,\nA.M. Guerreiro";var t=document.querySelector(".css-typing");e.split("").forEach(function(e,n){var a=document.createElement("span");a.innerHTML=e.replace(/\n/g,"<br>"),a.style.opacity=0,t.appendChild(a),setTimeout(function(){a.style.opacity=1},30*n)})});
</script>

</body>
</html>
