<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sebo digital de livros usados. Retire seu pedido no metrô Fradique Coutinho ou arredores. Coleta gratuita de doações de livros em São Paulo, SP. Atendimento por WhatsApp.">
  <meta name="keywords" content="sebo digital, livros usados, doar livros SP">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@700&display=swap">
  <style>
    body {
      max-width: 700px;
      margin: 0 auto;
      padding: 10px;
      font-family: 'Courier Prime', monospace;
      line-height: 1.6;
      font-size: 1.1em;
    }

    a {
      color: black;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #333;
        color: white;
      }
      a {
        color: white;
      }
    }

    .css-typing span {
      display: inline-block;
      opacity: 0;
    }

    .css-typing {
      white-space: pre-line;
    }
  </style>
  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script>
    $(document).ready(function() {
      var str = 'O Sebomelivro é um sebo digital de livros usados.\n\nTodos os livros à venda estão disponíveis na Estante Virtual. Você pode garimpar pelo título, autor ou utilizando os filtros.\n\nSe não quiser pagar frete, pode retirar seu pedido pessoalmente comigo nas catracas do metrô Fradique Coutinho ou arredores.\n\nCaso tenha livros para doar, eu coleto no local (São Paulo, SP). Basta agendar um horário.\n\nEntre em contato pelo WhatsApp (11) 98135-0566. Nele, além de agendar os serviços acima, também posso te enviar fotos detalhadas de um livro antes de você comprar.\n\nE sim, esse site é só isso mesmo. Sem fotos, sem vídeos, sem links, sem redes sociais. Assim, sobra mais tempo pra gente ler um livro.\n\nBoas leituras!\n\nA.M. Guerreiro\n\n"Um leitor vive mil vidas antes de morrer, o homem que nunca lê vive apenas uma." - George R.R. Martin';

      var spans = '<span>' + str.split('').join('</span><span>').replace(/\n/g, '<br>') + '</span>';
      $(spans).hide().appendTo('.css-typing').each(function (i) {
        $(this).delay(30 * i).css({
          display: 'inline',
          opacity: 0
        }).animate({
          opacity: 1
        }, 100);
      });
    });
  </script>
</head>
<body>

<div class="css-typing"></div>

</body>
</html>
