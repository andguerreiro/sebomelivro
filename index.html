<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sebo digital de livros usados. Retire seu pedido no metrô Fradique Coutinho ou arredores. Coleta gratuita de doações de livros em São Paulo, SP. Atendimento por WhatsApp.">
  <meta name="keywords" content="sebo digital, livros usados, doar livros são paulo, coleta gratuita livros">
  <link rel="icon" type="image/png" href="logo.png">
  <style>
    body {
      max-width: 700px;
      margin: 0 auto;
      padding: 0px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      line-height: 1.6;
      font-size: 1.1em;
    }

    .container {
      background-color: #faecd1;
      padding: 30px;
      box-shadow: inset 0 0 90px rgba(90, 90, 0, 0.5);
    }

    .css-typing {
      white-space: pre-line;
    }
  </style>
  <title>Sebomelivro - Livre-se das telas. Leia um livro.</title>
</head>
<body>
  <div class="container">
    <div class="css-typing"></div>
  </div>
  <script defer>
    document.addEventListener("DOMContentLoaded", function () {
      var e = "Caro leitor,\n\nBem-vindo ao Sebomelivro, um sebo digital de livros usados. Você pode adquirir os livros disponíveis via Estante Virtual ou WhatsApp. Seu pedido pode ser enviado pelos Correios ou retirado pessoalmente comigo nas catracas do metrô Fradique Coutinho e arredores.\n\nSe estiver em São Paulo e tiver livros de ficção para doar, agende uma coleta gratuita em seu endereço. Dessa forma, você libera espaço para novos livros e possibilita que os seus cheguem a outros leitores.\n\nPara esclarecer dúvidas ou solicitar fotos detalhadas de um livro antes de comprá-lo, envie uma mensagem pelo WhatsApp (11) 98135-0566.\n\nEsta página simula uma carta datilografada em papel amarelado para nos transportar à aura nostálgica dos sebos. Aqui não há fotos, vídeos ou redes sociais. Assim, sobra mais tempo para ler um livro.\n\nBoas leituras!\n\nAtenciosamente,\nA.M. Guerreiro";
      var t = document.querySelector(".css-typing");
      e.split("").forEach(function (e, n) {
        var a = document.createElement("span");
        a.innerHTML = e.replace(/\n/g, "<br>"), a.style.opacity = 0, t.appendChild(a), setTimeout(function () {
          a.style.opacity = 1
        }, 30 * n)
      })
    });
  </script>
</body>
</html>
