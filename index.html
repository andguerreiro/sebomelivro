<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sebo digital de livros usados. Retire seu pedido no metrô Fradique Coutinho ou arredores. Coleta gratuita de doações de livros em São Paulo, SP. Atendimento por WhatsApp.">
  <meta name="keywords" content="sebo digital, livros usados, doar livros são paulo, coleta gratuita livros">
  <link rel="icon" type="image/png" href="logo.png">
  <style>
    body {
      max-width: 700px;
      margin: 0 auto;
      padding: 15px;
      font-family: sans-serif;
      line-height: 1.6;
      font-size: 1.2em;
    }
    .css-typing {
      white-space: pre-line;
    }
  </style>
  <title>Sebomelivro</title>
</head>
<body>
  <div class="css-typing"></div>
  <script defer>
    document.addEventListener("DOMContentLoaded", function () {
      var e = "Estimado leitor,\n\nBem-vindo ao Sebomelivro, um sebo digital de livros usados.\n\nAqui você é atendido por um ser humano via WhatsApp, sem robôs ou inteligência artificial. Envie mensagem para (11) 98135-0566 que eu respondo rapidinho.\n\nSeu pedido pode ser enviado pelos Correios ou retirado comigo nas catracas do metrô Fradique Coutinho.\n\nVocê também pode doar os livros que não quer mais sem sair de casa. Só agendar uma coleta gratuita em São Paulo.\n\nE sim, essa página é só isso mesmo. Apenas uma carta datilografada. Sem redes sociais, vídeos ou rolagens infinitas. Assim, sobra mais tempo pra gente ler um livro.\n\nBoas leituras!\n\nAtenciosamente,\nA.M. Guerreiro, livreiro";
      var t = document.querySelector(".css-typing");
      e.split("").forEach(function (e, n) {
        var a = document.createElement("span");
        a.innerHTML = e.replace(/\n/g, "<br>"), a.style.opacity = 0, t.appendChild(a), setTimeout(function () {
          a.style.opacity = 1
        }, 40 * n)
      })
    });
  </script>
</body>
</html>
